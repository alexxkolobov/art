<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Блог — Alex Delete</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="main.js" defer></script>
    </head>
    <body class="blog-page">
        <div class="logo">Александр Колобов</div>

        <div class="side-nav">
            <div class="side-nav-item">
                <a href="#post-1" class="side-nav-link">наброски и тишина</a>
                <a href="#post-2" class="side-nav-link">новые текстуры</a>
            </div>
        </div>

        <div class="page blog">
            <div class="page-title-row">
                <a href="index.html" class="back"></a>
                <h1 class="blog-title">блог</h1>
            </div>

            <div class="blog-list">
                <article
                    class="post"
                    id="post-1"
                    data-title="Сходили на пленэр всей группой"
                    data-date="25.03.26"
                    data-location="Дмитриевский сквер"
                    data-content='
                        <p>Сегодня наша группа 13 "Д" выбралась на пленэр в Дмитриевский сквер. Погода порадовала — было тепло и солнечно, идеальные условия для рисования с натуры.</p>
                        <p>Рисовали архитектуру, деревья, людей. Каждый нашёл свой ракурс и сюжет.</p>
                    '
                >
                    <div class="post-meta">
                        <span class="post-date">25.03.26</span>
                        <span class="post-location">📍 Дмитриевский сквер</span>
                    </div>
                    <h3 class="post-title">Сходили на пленэр всей группой</h3>
                    <div class="post-content">
                        <p>Сегодня наша группа 13 "Д" выбралась на пленэр...</p>
                    </div>
                    <div class="post-images">
                        <img src="photo1.jpg" alt="Пленэр" />
                        <img src="photo2.jpg" alt="Пленэр" />
                    </div>
                </article>
            </div>
        </div>

        <!-- ОТКРЫТЫЙ ПОСТ -->
        <div class="post-view" id="postView">
            <div class="post-view-inner">
                <div class="post-title-row">
                    <a href="#" class="post-back"></a>
                    <h1 class="post-title" id="postTitle"></h1>
                </div>

                <div class="post-meta" id="postMeta"></div>
                <div class="post-content" id="postContent"></div>
            </div>
        </div>

        <!-- Lightbox -->
        <div class="lightbox" id="lightbox">
            <button class="lightbox-close">&times;</button>
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
                ←
            </button>
            <button class="lightbox-nav lightbox-next" id="lightboxNext">
                →
            </button>
            <div class="lightbox-content">
                <img src="" alt="" class="lightbox-img" id="lightbox-img" />
                <div class="lightbox-caption" id="lightbox-caption">
                    <div class="lightbox-info">
                        <span class="lightbox-year" id="lightbox-year"></span>
                        <span class="lightbox-exam" id="lightbox-exam"></span>
                    </div>
                    <span class="lightbox-counter" id="lightbox-counter"></span>
                </div>
            </div>
        </div>
    </body>
</html>
